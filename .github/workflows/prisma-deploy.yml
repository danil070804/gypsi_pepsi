name: Prisma Migrate Deploy

on:
  push:
    branches: [ main ]

jobs:
  migrate:
    name: Run prisma migrate deploy and generate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run migrations and generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          npx prisma migrate deploy
          npx prisma generate
