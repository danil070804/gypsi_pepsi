name: Prisma DB Setup

on:
  push:
    branches: [ main ]

jobs:
  migrate:
    name: Run Prisma setup with P3005 fallback
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma setup
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: node scripts/prisma-railway-setup.mjs
